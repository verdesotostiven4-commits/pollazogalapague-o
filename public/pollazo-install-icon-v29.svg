<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Pollazo Galapagueño</title>
  <desc id="desc">Icono oficial de La Casa del Pollazo</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#ffc928"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#7c2d12" flood-opacity=".28"/>
    </filter>
    <clipPath id="circleClip"><circle cx="256" cy="256" r="236"/></clipPath>
  </defs>
  <rect width="512" height="512" rx="108" fill="#fff7ed"/>
  <circle cx="256" cy="256" r="236" fill="url(#bg)" stroke="#ff4d00" stroke-width="18"/>
  <g clip-path="url(#circleClip)">
    <image href="/pollazo-icon-512-v27.png" xlink:href="/pollazo-icon-512-v27.png" x="8" y="8" width="496" height="496" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <circle cx="256" cy="256" r="236" fill="none" stroke="#ff4d00" stroke-width="18"/>
  <g aria-hidden="true" filter="url(#shadow)" opacity="0">
    <text x="256" y="210" text-anchor="middle" font-family="Arial Rounded MT Bold,Arial,sans-serif" font-size="92" font-weight="900" fill="#ff7300" stroke="#fff" stroke-width="12" paint-order="stroke">Pollazo</text>
    <text x="256" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="900" fill="#111" stroke="#fff" stroke-width="8" paint-order="stroke">GALAPAGUEÑO</text>
  </g>
</svg>
