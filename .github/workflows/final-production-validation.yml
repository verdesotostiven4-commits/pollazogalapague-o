name: Final production validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-validation-logs
          path: |
            typecheck.log
            lint.log
            build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Fail when a validation failed
        if: always()
        shell: bash
        run: |
          test "${{ steps.typecheck.outcome }}" = "success"
          test "${{ steps.lint.outcome }}" = "success"
          test "${{ steps.build.outcome }}" = "success"
