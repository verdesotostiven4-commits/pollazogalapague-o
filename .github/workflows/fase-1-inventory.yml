name: Fase 1 Inventory

on:
  push:
    branches:
      - stabilization/fase-1
    paths:
      - .github/workflows/fase-1-inventory.yml

permissions:
  contents: write

jobs:
  inventory:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout phase branch
        uses: actions/checkout@v4
        with:
          ref: stabilization/fase-1
          fetch-depth: 0

      - name: Build repository inventory
        shell: bash
        run: |
          {
            echo "# Phase 1 repository inventory"
            echo
            echo "Commit: $(git rev-parse HEAD)"
            echo
            echo "## Files"
            find . -type f \
              -not -path './.git/*' \
              -not -path './node_modules/*' \
              -not -path './dist/*' \
              | sort
            echo
            echo "## Supabase migrations"
            find supabase/migrations -maxdepth 1 -type f 2>/dev/null | sort || true
            echo
            echo "## Type imports"
            grep -Rho "import type {[^}]*} from ['\"]\./types['\"]\|import type {[^}]*} from ['\"]\.\./types['\"]" src 2>/dev/null | sort -u || true
            echo
            echo "## Direct order writes"
            grep -Rni "from('orders')\|from(\"orders\")" src api 2>/dev/null || true
            echo
            echo "## Direct customer writes"
            grep -Rni "from('customers')\|from(\"customers\")" src api 2>/dev/null || true
          } > PHASE1_INVENTORY.txt

      - name: Commit inventory
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PHASE1_INVENTORY.txt
          git commit -m "docs(audit): record phase 1 repository inventory"
          git push origin HEAD:stabilization/fase-1
