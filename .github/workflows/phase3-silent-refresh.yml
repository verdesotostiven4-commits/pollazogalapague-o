name: Phase 3 silent refresh patch

on:
  push:
    branches:
      - phase3/admin-refresh-stability

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase3/admin-refresh-stability
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply safe refresh patch
        run: node scripts/phase3-silent-refresh.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/context/AdminContext.tsx src/components/DeliveryDashboard.tsx
          if git diff --cached --quiet; then
            echo "No hay cambios pendientes"
            exit 0
          fi
          git commit -m "Estabilizar refresco silencioso de admin y repartidor"
          git push origin HEAD:phase3/admin-refresh-stability
