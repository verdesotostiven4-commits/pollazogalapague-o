name: Fix order status updates

on:
  pull_request:
    branches:
      - main
    paths:
      - src/utils/orderLifecycleApi.ts
      - scripts/fix-order-status-updates.py
      - .github/workflows/fix-order-status-updates.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/actualizar-estados-pedido
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply order status fix
        run: python3 scripts/fix-order-status-updates.py

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript, security, lint and production build
        run: npm run validate

      - name: Commit validated application files
        run: |
          rm -f scripts/fix-order-status-updates.py
          rm -f .github/workflows/fix-order-status-updates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip ci] Corregir actualización de estados de pedidos"
          git push origin HEAD:fix/actualizar-estados-pedido
