name: Phase 8 harden live tracking

on:
  push:
    branches:
      - main
    paths:
      - scripts/phase8-harden-live-tracking.mjs
      - .github/workflows/phase8-harden-live-tracking.yml

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply production hardening
        run: node scripts/phase8-harden-live-tracking.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Commit verified production changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/RiderTrackingBridge.tsx
          if git diff --cached --quiet; then
            echo "No hay cambios pendientes"
            exit 0
          fi
          git commit -m "[skip ci] Endurecer GPS real y autoasignación"
          git push origin HEAD:main

# Trigger intencional: validar una sola vez antes del despliegue final.
