name: Restore login MapLibre map

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/restore-login-maplibre.py
      - .github/workflows/restore-login-maplibre.yml

permissions:
  contents: write

jobs:
  restore-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/restaurar-mapa-login-maplibre
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore ZIP map implementation
        run: python3 scripts/restore-login-maplibre.py

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript, security, lint and production build
        run: npm run validate

      - name: Commit validated application files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/LoginModal.tsx public/sw.js
          git commit -m "[skip ci] Restaurar mapa fluido del ZIP en el registro"
          git push origin HEAD:fix/restaurar-mapa-login-maplibre
