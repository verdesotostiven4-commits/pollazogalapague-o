name: Phase 2 Diagnostics

on:
  pull_request:
    branches:
      - phase2-ci-base-20260711

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install
        run: npm ci --silent

      - name: TypeScript
        run: npm run typecheck --silent
