name: Phase 1 CI

on:
  push:
    branches:
      - main
      - phase-1-stabilization-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Generate synchronized lockfile for diagnosis
        run: npm install --package-lock-only --ignore-scripts

      - name: Upload synchronized lockfile
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-lockfile
          path: package-lock.json
          if-no-files-found: error
          retention-days: 3

      - name: Install dependencies from synchronized lockfile
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
