name: Phase 1 CI

on:
  push:
    branches:
      - main
      - phase-1-stabilization-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Client security check
        id: security
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run security:check 2>&1 | tee security-check.log

      - name: Upload security diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-security-diagnostics
          path: security-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Fail when security check failed
        if: ${{ steps.security.outcome == 'failure' }}
        run: exit 1
