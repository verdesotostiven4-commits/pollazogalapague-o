name: Phase 1 CI

on:
  push:
    branches:
      - main
      - phase-1-stabilization-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout phase branch
        uses: actions/checkout@v4
        with:
          ref: phase-1-stabilization-20260711

      - name: Protect customer profile and membership state
        run: python .github/scripts/apply_customer_session_context.py

      - name: Persist protected customer context
        run: |
          git add src/context/UserContext.tsx
          if git diff --cached --quiet; then
            echo "Protected customer context is already applied"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "security(customer): stop direct profile and membership access"
            git push origin HEAD:phase-1-stabilization-20260711
          fi

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
