name: Phase 1 CI

on:
  push:
    branches:
      - main
      - phase-1-stabilization-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout phase branch
        uses: actions/checkout@v4
        with:
          ref: phase-1-stabilization-20260711

      - name: Finalize protected inventory operations
        run: python .github/scripts/finalize_phase1_inventory.py

      - name: Persist final inventory correction
        run: |
          git add src/components/AdminInventoryLauncher.tsx
          if git diff --cached --quiet; then
            echo "Inventory protection already finalized"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "security(inventory): route remaining operations through server"
            git push origin HEAD:phase-1-stabilization-20260711
          fi

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Client security check
        run: npm run security:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
