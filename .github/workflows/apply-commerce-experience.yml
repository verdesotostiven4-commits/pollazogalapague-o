name: Apply commerce and ETA experience

on:
  pull_request:
    branches:
      - main
    paths:
      - src/utils/commerce.ts
      - public/pollazo-splash-clean-v10.svg
      - scripts/apply-commerce-experience.py
      - scripts/fix-commerce-experience-output.py
      - .github/workflows/apply-commerce-experience.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: phase8/comercio-eta-experiencia
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply commerce experience
        run: |
          python3 scripts/apply-commerce-experience.py
          python3 scripts/fix-commerce-experience-output.py

      - name: Install exact dependencies
        run: npm ci

      - name: Validate TypeScript, security, lint and production build
        run: npm run validate

      - name: Commit verified application
        run: |
          rm -f scripts/apply-commerce-experience.py
          rm -f scripts/fix-commerce-experience-output.py
          rm -f .github/workflows/apply-commerce-experience.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip ci] Aplicar precios, ETA y experiencia comercial"
          git push origin HEAD:phase8/comercio-eta-experiencia
