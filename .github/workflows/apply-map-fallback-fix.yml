name: Apply map fallback fix

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/apply-map-fallback-fix.py
      - src/components/RasterMapFallback.tsx
      - .github/workflows/apply-map-fallback-fix.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mapa-registro-raster-fallback
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Aplicar corrección
        run: python3 scripts/apply-map-fallback-fix.py
      - name: Instalar dependencias
        run: npm ci
      - name: Validar proyecto
        run: npm run validate
      - name: Guardar cambios verificados
        run: |
          rm -f scripts/apply-map-fallback-fix.py
          rm -f .github/workflows/apply-map-fallback-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip ci] Corregir mapa de registro con respaldo raster"
          git push origin HEAD:fix/mapa-registro-raster-fallback
