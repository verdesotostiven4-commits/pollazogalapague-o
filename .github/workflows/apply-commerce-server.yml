name: Apply commerce server rules

on:
  pull_request:
    branches:
      - main
    paths:
      - server/delivery-tracking-push.ts
      - scripts/apply-commerce-server.py
      - .github/workflows/apply-commerce-server.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: phase8/comercio-eta-experiencia
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply server rules
        run: python3 scripts/apply-commerce-server.py

      - name: Install exact dependencies
        run: npm ci

      - name: Validate TypeScript, security, lint and production build
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          npm run validate 2>&1 | tee commerce-server-validation.log

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commerce-server-diagnostic
          path: commerce-server-validation.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Stop after validation failure
        if: steps.validation.outcome == 'failure'
        run: exit 1

      - name: Commit verified server and admin changes
        run: |
          rm -f commerce-server-validation.log
          rm -f scripts/apply-commerce-server.py
          rm -f .github/workflows/apply-commerce-server.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip ci] Aplicar reglas comerciales seguras y notificaciones GPS"
          git push origin HEAD:phase8/comercio-eta-experiencia
