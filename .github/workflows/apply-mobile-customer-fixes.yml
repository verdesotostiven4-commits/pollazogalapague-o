name: Apply mobile customer fixes

on:
  push:
    branches:
      - fix/mobile-customer-experience
    paths:
      - scripts/apply-mobile-customer-fixes.py
      - .github/workflows/apply-mobile-customer-fixes.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-mobile-customer-fixes.py
      - .github/workflows/apply-mobile-customer-fixes.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/mobile-customer-experience
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply mobile customer fixes
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          sed -i "s#api/\[...route\]\.ts#api/router.ts#g" scripts/apply-mobile-customer-fixes.py
          python3 scripts/apply-mobile-customer-fixes.py 2>&1 | tee mobile-fix.log
          sed -i "s/attributionControl: true,/attributionControl: { compact: true },/" src/components/LoginModal.tsx
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/components/Testimonials.tsx')
          source = path.read_text(encoding='utf-8')
          anchor = "  PartyPopper,\n  ChevronDown,"
          if anchor not in source:
              raise SystemExit('No se encontró el import para MessageCircle')
          path.write_text(source.replace(anchor, "  PartyPopper,\n  MessageCircle,\n  ChevronDown,", 1), encoding='utf-8')
          PY

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Install exact dependencies
        run: npm ci

      - name: Validate TypeScript, lint and production build
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          npm run validate 2>&1 | tee mobile-validate.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-customer-diagnostics
          path: |
            mobile-fix.log
            mobile-validate.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Stop after validation failure
        if: steps.validation.outcome == 'failure'
        run: exit 1

      - name: Commit verified changes
        run: |
          rm -f mobile-fix.log mobile-validate.log
          rm -f scripts/apply-mobile-customer-fixes.py
          rm -f .github/workflows/apply-mobile-customer-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip ci] Mejorar experiencia móvil del cliente"
          git push origin HEAD:fix/mobile-customer-experience
