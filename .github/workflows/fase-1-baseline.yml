name: Fase 1 Baseline

on:
  push:
    branches:
      - stabilization/fase-1
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout phase branch
        uses: actions/checkout@v4
        with:
          ref: stabilization/fase-1
          fetch-depth: 0

      - name: Apply pending hook-order correction
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/InfoScreen.tsx')
          text = path.read_text(encoding='utf-8')
          old = """}) {
  if (!open) return null;

  const currentLevel = getCustomerLevel(exp);
  const { t } = useLanguage();
"""
          new = """}) {
  const { t } = useLanguage();

  if (!open) return null;

  const currentLevel = getCustomerLevel(exp);
"""

          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif new not in text:
              raise SystemExit('Expected LevelGuideSheet hook pattern was not found')

      - name: Commit hook-order correction when needed
        shell: bash
        run: |
          if git diff --quiet -- src/components/InfoScreen.tsx; then
            echo "Hook order already corrected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/InfoScreen.tsx
          git commit -m "fix(react): keep language hook order stable"
          git push origin HEAD:stabilization/fase-1

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies reproducibly
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint check
        run: npm run lint

      - name: Production build
        run: npm run build
