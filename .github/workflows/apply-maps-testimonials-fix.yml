name: Apply maps and testimonials production fix

on:
  pull_request:
    branches:
      - main
    paths:
      - server/api-handlers/map-tile.ts
      - scripts/apply-maps-testimonials-fix.py
      - .github/workflows/apply-maps-testimonials-fix.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/mapas-opiniones-produccion
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply map and testimonial fixes
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          python3 scripts/apply-maps-testimonials-fix.py 2>&1 | tee maps-testimonials-patch.log

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Install exact dependencies
        run: npm ci

      - name: Validate TypeScript, security, lint and production build
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          npm run validate 2>&1 | tee maps-testimonials-validation.log

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maps-testimonials-diagnostic
          path: |
            maps-testimonials-patch.log
            maps-testimonials-validation.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Stop after validation failure
        if: steps.validation.outcome == 'failure'
        run: exit 1

      - name: Commit verified application files
        run: |
          rm -f maps-testimonials-patch.log maps-testimonials-validation.log
          rm -f scripts/apply-maps-testimonials-fix.py
          rm -f .github/workflows/apply-maps-testimonials-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip ci] Corregir mapas y opiniones en producción"
          git push origin HEAD:fix/mapas-opiniones-produccion
