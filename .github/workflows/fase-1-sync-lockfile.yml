name: Fase 1 Sync Lockfile

on:
  push:
    branches:
      - stabilization/fase-1
    paths:
      - package.json
      - .github/workflows/fase-1-sync-lockfile.yml

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout phase branch
        uses: actions/checkout@v4
        with:
          ref: stabilization/fase-1
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Regenerate package lock only
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit synchronized lockfile
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already synchronized"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(build): synchronize npm lockfile"
          git push origin HEAD:stabilization/fase-1
