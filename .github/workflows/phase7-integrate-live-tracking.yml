name: Phase 7 integrate live tracking

on:
  push:
    branches:
      - phase7/live-tracking-integration

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase7/live-tracking-integration
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply integration patch
        run: node scripts/phase7-integrate-live-tracking.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Commit verified integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AdminDashboard.tsx src/components/DeliveryDashboard.tsx src/components/CustomerTrackingMapLab.tsx src/components/OrderTracking.tsx
          if git diff --cached --quiet; then
            echo "No hay cambios pendientes"
            exit 0
          fi
          git commit -m "Conectar rastreo real con admin, repartidor y cliente"
          git push origin HEAD:phase7/live-tracking-integration
