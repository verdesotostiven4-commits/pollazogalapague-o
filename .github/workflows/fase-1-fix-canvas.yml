name: Fase 1 Fix Canvas Context

on:
  push:
    branches:
      - stabilization/fase-1
    paths:
      - .github/workflows/fase-1-fix-canvas.yml

permissions:
  contents: write

jobs:
  fix-canvas-context:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilization/fase-1
          fetch-depth: 0

      - name: Preserve narrowed canvas context
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/CartScreen.tsx')
          text = path.read_text(encoding='utf-8')
          marker = "  const count = 55;"
          replacement = "  const confettiContext: CanvasRenderingContext2D = context;\n\n  const count = 55;"
          if marker not in text:
              raise SystemExit('Canvas marker not found')
          text = text.replace(marker, replacement, 1)
          text = text.replace('    context.clearRect(', '    confettiContext.clearRect(', 1)
          text = text.replace('      context.globalAlpha', '      confettiContext.globalAlpha')
          text = text.replace('      context.fillStyle', '      confettiContext.fillStyle')
          text = text.replace('      context.save()', '      confettiContext.save()')
          text = text.replace('      context.translate(', '      confettiContext.translate(')
          text = text.replace('      context.rotate(', '      confettiContext.rotate(')
          text = text.replace('      context.fillRect(', '      confettiContext.fillRect(')
          text = text.replace('      context.restore()', '      confettiContext.restore()')
          path.write_text(text, encoding='utf-8')

      - name: Commit canvas fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/CartScreen.tsx
          git commit -m "fix(cart): preserve non-null canvas context"
          git pull --rebase origin stabilization/fase-1
          git push origin HEAD:stabilization/fase-1
