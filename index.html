      :root {

      input,
      textarea,
      select {

        -khtml-user-select: auto !important;

      #root {
        width: 100%;
        min-height: 100dvh;
        background: #ffffff;
        overflow-x: hidden;
        position: relative;
        isolation: isolate;
      }

      @media (min-width: 720px) and (hover: hover) and (pointer: fine) {
        html,
        body {
          background:
            radial-gradient(circle at 20% 0%, rgba(251, 191, 36, 0.18), transparent 34%),
            radial-gradient(circle at 80% 100%, rgba(249, 115, 22, 0.16), transparent 34%),

        #root {
          width: min(100vw, 430px);
          max-width: 430px;
          margin: 0 auto;
          box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.08), 0 30px 90px rgba(124, 45, 18, 0.18);
        }
      }

      .pollazo-desktop-mode-warning {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(251, 191, 36, 0.28), transparent 38%),
          rgba(15, 23, 42, 0.64);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .pollazo-desktop-mode-warning__card {
        width: min(100%, 390px);
        border-radius: 34px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.32);
        text-align: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .pollazo-desktop-mode-warning__icon {
        display: grid;
        place-items: center;
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 24px;
        color: #ffffff;
        font-size: 34px;
        font-weight: 900;
        background: linear-gradient(135deg, #f97316, #facc15);
        box-shadow: 0 16px 32px rgba(249, 115, 22, 0.34);
      }

      .pollazo-desktop-mode-warning h1 {

        color: #0f172a;
        font-size: 29px;
        line-height: 0.95;
        letter-spacing: -0.06em;
        text-transform: uppercase;

      .pollazo-desktop-mode-warning p {

        color: #64748b;
        font-size: 16px;
        font-weight: 700;

      }

      .pollazo-desktop-mode-warning__steps {
        margin: 20px 0 0;
        border-radius: 24px;
        background: #fff7ed;
        padding: 16px;
        color: #9a3412;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.5;
        text-align: left;
      }

      .pollazo-desktop-mode-warning button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        padding: 17px 18px;
        color: #ffffff;
        background: linear-gradient(135deg, #f97316, #facc15);
        box-shadow: 0 16px 30px rgba(249, 115, 22, 0.28);
        font-size: 14px;

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function warnWhenDesktopModeIsEnabledOnPhone() {
        var dismissed = false;

        function isDesktopModeOnPhone() {
          var isTouch = (navigator.maxTouchPoints || 0) > 0 || 'ontouchstart' in window;
          var dpr = window.devicePixelRatio || 1;
          var width = window.innerWidth || 0;
          var height = window.innerHeight || 0;
          var looksLikeInflatedDesktopViewport = Math.max(width, height) > 760 && Math.min(width, height) > 600;

          return isTouch && dpr > 1.15 && looksLikeInflatedDesktopViewport;
        }

        function removeWarning() {
          var existing = document.getElementById('pollazo-desktop-mode-warning');
          if (existing) existing.remove();
        }

        function renderWarning() {
          if (dismissed || !isDesktopModeOnPhone()) {
            removeWarning();
            return;
          }

          if (document.getElementById('pollazo-desktop-mode-warning')) return;

          var overlay = document.createElement('div');
          overlay.id = 'pollazo-desktop-mode-warning';
          overlay.className = 'pollazo-desktop-mode-warning';
          overlay.innerHTML =
            '<div class="pollazo-desktop-mode-warning__card" role="dialog" aria-modal="true" aria-label="Modo escritorio activo">' +
              '<div class="pollazo-desktop-mode-warning__icon">!</div>' +
              '<h1>Modo escritorio activo</h1>' +
              '<p>Pollazo está optimizada como app móvil. Chrome está forzando una vista de computadora y puede romper el scroll o agrandar elementos.</p>' +
              '<div class="pollazo-desktop-mode-warning__steps">En Chrome toca ⋮ y desmarca <strong>Sitio para computadora</strong>. Luego vuelve y toca el botón de abajo.</div>' +
              '<button type="button" id="pollazo-desktop-mode-reload">Ya lo desactivé</button>' +
            '</div>';

          document.body.appendChild(overlay);

          var button = document.getElementById('pollazo-desktop-mode-reload');
          if (button) {
            button.addEventListener('click', function () {
              window.location.reload();
            });
          }
        }

        window.addEventListener('load', renderWarning);
        window.addEventListener('resize', renderWarning, { passive: true });
        window.addEventListener('orientationchange', function () {
          window.setTimeout(renderWarning, 250);
        });
      })();
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/sw.js");
            registration.update().catch(() => {});
          } catch {
            // No pasa nada si falla el service worker.
          }
        });
      }
    </script>
