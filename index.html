<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta charset="UTF-8" />
    <!-- 🛡️ BLOQUEO DE ZOOM VIP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Pollazo El Mirador</title>
    <meta name="description" content="Tu market de confianza con pollo fresco enfundado en Puerto Ayora." />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pollazo" />
    
    <link rel="apple-touch-icon" href="https://blogger.googleusercontent.com/img/a/AVvXsEjjZyWBEfS2-yN9AffqCBbrsiquVeUUQYsQPGLI31cI5B5mVzSowezui2lHQ6gpXGKpU5x6Uuuy_YtDfGm72-81dSiCAYnAfNRqcWavKUNO0LMmpeI_bh80Tb1CcAUqM21cn-YPji0ZHyuDq_6CcKs4-kIJmzsEqwFYeXxkMD9SlSrjmhOylKISX_CwHY0">

    <meta property="og:title" content="Pollazo El Mirador" />
    <meta property="og:description" content="Pollo fresco y productos para tu hogar en Galápagos." />
    
    <meta property="og:image" content="https://blogger.googleusercontent.com/img/a/AVvXsEjjZyWBEfS2-yN9AffqCBbrsiquVeUUQYsQPGLI31cI5B5mVzSowezui2lHQ6gpXGKpU5x6Uuuy_YtDfGm72-81dSiCAYnAfNRqcWavKUNO0LMmpeI_bh80Tb1CcAUqM21cn-YPji0ZHyuDq_6CcKs4-kIJmzsEqwFYeXxkMD9SlSrjmhOylKISX_CwHY0" />
    <meta property="og:type" content="website" />

    <style>
      /* =========================================================
         🛡️ BLOQUEO DE SELECCIÓN DE TEXTO Y MENÚS FLOTANTES NATIVOS
         ========================================================= */
      html, body {
        -webkit-touch-callout: none; /* iOS Safari: Desactiva el menú flotante al mantener pulsado */
        -webkit-user-select: none;   /* Safari */
        -khtml-user-select: none;    /* Konqueror HTML */
        -moz-user-select: none;      /* Firefox antiguo */
        -ms-user-select: none;       /* IE/Edge */
        user-select: none;           /* Chrome, Edge, Firefox moderno */
        -webkit-tap-highlight-color: transparent; /* Quita el cuadro azul en Android al hacer tap */
        touch-action: pan-x pan-y;   /* Permite scroll fluido pero anula gestos raros como doble-tap-zoom */
      }

      /* 🔓 EXCEPCIÓN: Los inputs y textareas SÍ deben poder seleccionarse para escribir */
      input, textarea, select {
        -webkit-user-select: auto !important;
        -khtml-user-select: auto !important;
        -moz-user-select: auto !important;
        -ms-user-select: auto !important;
        user-select: auto !important;
      }

      #html-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f97316; /* Naranja Pollazo */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      #html-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #html-splash img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        filter: drop-shadow(0 15px 35px rgba(0,0,0,0.25));
        animation: splashPulse 2s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
    </style>
  </head>
  <body>
    <div id="html-splash">
      <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjjZyWBEfS2-yN9AffqCBbrsiquVeUUQYsQPGLI31cI5B5mVzSowezui2lHQ6gpXGKpU5x6Uuuy_YtDfGm72-81dSiCAYnAfNRqcWavKUNO0LMmpeI_bh80Tb1CcAUqM21cn-YPji0ZHyuDq_6CcKs4-kIJmzsEqwFYeXxkMD9SlSrjmhOylKISX_CwHY0" alt="Pollazo El Mirador" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Registro del Service Worker para que se pueda instalar
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // Quitar el splash cuando React esté listo
      window.addEventListener('load', () => {
        const splash = document.getElementById('html-splash');
        if (splash) {
          setTimeout(() => {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 400);
          }, 400);
        }
      });
    </script>
  </body>
</html>
