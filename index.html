    <script>
      (function lockPollazoMobileViewport() {
        var meta = document.querySelector('meta[name="viewport"]');
        if (!meta) return;

        var buildContent = function () {
          var screenWidth = window.screen && window.screen.width ? window.screen.width : 0;
          var innerWidth = window.innerWidth || 0;
          var isTouchPhone =
            (navigator.maxTouchPoints || 0) > 0 &&
            screenWidth > 0 &&
            screenWidth <= 540;

          if (isTouchPhone) {
            var lockedWidth = Math.max(320, Math.min(430, Math.round(screenWidth)));
            return 'width=' + lockedWidth + ', initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
          }

          if (innerWidth > 0 && innerWidth <= 540) {
            return 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
          }

          return 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
        };

        var apply = function () {
          meta.setAttribute('content', buildContent());
          document.documentElement.classList.add('pollazo-mobile-app-shell');
        };

        apply();
        window.addEventListener('orientationchange', function () {
          window.setTimeout(apply, 80);
          window.setTimeout(apply, 320);
        });
        window.addEventListener('resize', apply, { passive: true });
      })();
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/sw.js");
            registration.update().catch(() => {});
          } catch {
            // No pasa nada si falla el service worker.
          }
        });
