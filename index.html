<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>Pollazo Galapagueño</title>
    <meta
      name="description"
      content="Tu market de confianza con pollo fresco enfundado en Puerto Ayora."
    />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="manifest" href="/manifest.json?v=10" />
    <meta name="theme-color" content="#f97316" />
    <meta name="background-color" content="#f97316" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Pollazo Gal" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pollazo Gal" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=10" />
    <link rel="icon" type="image/png" href="/favicon-48.png?v=10" />

    <meta property="og:title" content="Pollazo Galapagueño El Mirador" />
    <meta
      property="og:description"
      content="Pollo fresco y productos para tu hogar en Galápagos."
    />
    <meta property="og:image" content="/splash-logo-1024.png?v=10" />
    <meta property="og:type" content="website" />

    <style>
      html,
      body {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-x pan-y;
        background: #f97316;
      }

      input,
      textarea,
      select {
        -webkit-user-select: auto !important;
        -khtml-user-select: auto !important;
        -moz-user-select: auto !important;
        -ms-user-select: auto !important;
        user-select: auto !important;
      }

      #html-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background:
          radial-gradient(circle at 50% 35%, rgba(251, 191, 36, 0.45), transparent 34%),
          linear-gradient(180deg, #fb923c 0%, #f97316 48%, #ea580c 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
        overflow: hidden;
      }

      #html-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #html-splash img {
        position: relative;
        width: min(78vw, 310px);
        height: min(78vw, 310px);
        object-fit: contain;
        animation: splashPulse 2s ease-in-out infinite;
      }

      @keyframes splashPulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.035);
        }
      }
    </style>
  </head>

  <body>
    <div id="html-splash">
      <img
        src="/splash-logo-1024.png?v=10"
        alt="Pollazo Galapagueño"
      />
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js?v=10").catch(() => {});
        });
      }

      window.addEventListener("load", () => {
        const splash = document.getElementById("html-splash");

        if (splash) {
          setTimeout(() => {
            splash.classList.add("fade-out");
            setTimeout(() => splash.remove(), 400);
          }, 400);
        }
      });
    </script>
  </body>
</html>
