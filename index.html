    <meta name="apple-mobile-web-app-title" content="Pollazo" />

    <meta property="og:title" content="Pollazo El Mirador" />

    <meta property="og:image" content="https://blogger.googleusercontent.com/img/a/AVvXsEin3pN4YDaHP3IxmNrtpbD2swEb9qpEJOsOmbbbtAmlaSgSicNgZbB9jYTdfdX4oiDOBORD4h5oDSRlFbzw6-3B6c2sFH7s3T0tla5kFjCe6treln_EPQ5a2i7V-ghUqJyTeVztj1ORThqO-G-eqO1eyDxo3MsEsoiBW60fatCa7SNeVHtJd-a3vLrjhtg" />
    <meta property="og:type" content="website" />

    <style>
      #html-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f97316; /* Naranja Pollazo */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      #html-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #html-splash img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        filter: drop-shadow(0 15px 35px rgba(0,0,0,0.25));
        animation: splashPulse 2s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
    </style>
  </head>
  <body>
    <div id="html-splash">
      <img src="https://blogger.googleusercontent.com/img/a/AVvXsEin3pN4YDaHP3IxmNrtpbD2swEb9qpEJOsOmbbbtAmlaSgSicNgZbB9jYTdfdX4oiDOBORD4h5oDSRlFbzw6-3B6c2sFH7s3T0tla5kFjCe6treln_EPQ5a2i7V-ghUqJyTeVztj1ORThqO-G-eqO1eyDxo3MsEsoiBW60fatCa7SNeVHtJd-a3vLrjhtg" alt="Pollazo El Mirador" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Registro del Service Worker para que se pueda instalar
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // Quitar el splash cuando React esté listo
      window.addEventListener('load', () => {
        const splash = document.getElementById('html-splash');
        if (splash) {
          setTimeout(() => {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 400);
          }, 400);
        }
      });
    </script>
  </body>
</html>
