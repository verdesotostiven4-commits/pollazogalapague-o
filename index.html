    <script>
      (function lockPollazoMobileViewport() {
        var meta = document.querySelector('meta[name="viewport"]');
        if (!meta) return;

        var clamp = function (value, min, max) {
          return Math.max(min, Math.min(max, value));
        };

        var getEstimatedPhoneWidth = function () {
          var dpr = window.devicePixelRatio || 1;
          var innerWidth = window.innerWidth || 390;
          var screenWidth = window.screen && window.screen.width ? window.screen.width : 0;
          var screenHeight = window.screen && window.screen.height ? window.screen.height : 0;
          var smallestScreenSide = Math.min(screenWidth || innerWidth, screenHeight || innerWidth);

          var fromDesktopViewport = innerWidth > 640 && dpr > 1.15 ? Math.round(innerWidth / dpr) : 0;
          var fromScreenSide = smallestScreenSide > 640 && dpr > 1.15 ? Math.round(smallestScreenSide / dpr) : smallestScreenSide;
          var bestGuess = fromDesktopViewport || fromScreenSide || 390;

          return clamp(Math.round(bestGuess), 360, 430);
        };

        var isTouchPhoneLike = function () {
          var ua = (navigator.userAgent || '').toLowerCase();
          var isTouch = (navigator.maxTouchPoints || 0) > 0 || 'ontouchstart' in window;
          var dpr = window.devicePixelRatio || 1;
          var innerWidth = window.innerWidth || 0;
          var innerHeight = window.innerHeight || 0;
          var biggestSide = Math.max(innerWidth, innerHeight);
          var mobileUA = /android|iphone|ipad|ipod|mobile/.test(ua);

          return isTouch && (mobileUA || dpr > 1.15 || biggestSide <= 1400);
        };

        var apply = function () {
          var innerWidth = window.innerWidth || 390;
          var phoneWidth = getEstimatedPhoneWidth();
          var desktopModeOnPhone = isTouchPhoneLike() && innerWidth > 640;
          var viewportWidth = desktopModeOnPhone ? phoneWidth : 'device-width';
          var mobileScale = desktopModeOnPhone ? clamp(innerWidth / phoneWidth, 1, 3.2) : 1;

          meta.setAttribute(
            'content',
            'width=' + viewportWidth + ', initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
          );

          document.documentElement.classList.add('pollazo-mobile-app-shell');
          document.documentElement.classList.toggle('pollazo-desktop-mode-mobile', desktopModeOnPhone);
          document.documentElement.style.setProperty('--pollazo-phone-width', phoneWidth + 'px');
          document.documentElement.style.setProperty('--pollazo-mobile-scale', String(mobileScale));
          document.documentElement.style.setProperty('--pollazo-real-viewport-width', innerWidth + 'px');
        };

        apply();
        window.addEventListener('orientationchange', function () {
          window.setTimeout(apply, 80);
          window.setTimeout(apply, 320);
          window.setTimeout(apply, 720);
        });
        window.addEventListener('resize', apply, { passive: true });
        document.addEventListener('visibilitychange', apply, { passive: true });
      })();
    </script>

    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-x pan-y;
        overscroll-behavior: none;
      }

      input,
      textarea,
      select {
        -webkit-user-select: auto !important;
        -khtml-user-select: auto !important;
        -moz-user-select: auto !important;
        -ms-user-select: auto !important;
        user-select: auto !important;
      }

      #root {
        width: 100%;
        min-height: 100dvh;
        background: #ffffff;
        overflow-x: hidden;
        position: relative;
        isolation: isolate;
      }

      @media (min-width: 720px) and (hover: hover) and (pointer: fine) {
        html.pollazo-mobile-app-shell,
        html.pollazo-mobile-app-shell body {
          background:
            radial-gradient(circle at 20% 0%, rgba(251, 191, 36, 0.18), transparent 34%),
            radial-gradient(circle at 80% 100%, rgba(249, 115, 22, 0.16), transparent 34%),
            #fff7ed;
        }

        html.pollazo-mobile-app-shell #root {
          width: min(100vw, 430px);
          max-width: 430px;
          margin: 0 auto;
          box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.08), 0 30px 90px rgba(124, 45, 18, 0.18);
        }
      }

      html.pollazo-desktop-mode-mobile,
      html.pollazo-desktop-mode-mobile body {
        width: 100vw !important;
        min-width: 100vw !important;
        max-width: 100vw !important;
        margin: 0 !important;
        background: #ffffff !important;
        overflow-x: hidden !important;
        overscroll-behavior: none !important;
      }

      html.pollazo-desktop-mode-mobile #root {
        width: var(--pollazo-phone-width, 390px) !important;
        min-width: var(--pollazo-phone-width, 390px) !important;
        max-width: var(--pollazo-phone-width, 390px) !important;
        margin: 0 !important;
        background: #ffffff !important;
        box-shadow: none !important;
        overflow-x: hidden !important;
        zoom: var(--pollazo-mobile-scale, 1) !important;
        transform: none !important;
        transform-origin: top left !important;
      }

      html.pollazo-desktop-mode-mobile #root [class*="md:grid-cols-"],
      html.pollazo-desktop-mode-mobile #root [class*="lg:grid-cols-"],
      html.pollazo-desktop-mode-mobile #root [class*="xl:grid-cols-"] {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }
    </style>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/sw.js");
            registration.update().catch(() => {});
          } catch {
            // No pasa nada si falla el service worker.
          }
        });
      }
    </script>
