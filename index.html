    <style>
      :root {
        color-scheme: light;
        --pollazo-orange: #ff5a00;
        --pollazo-orange-2: #ff8a00;
        --pollazo-yellow: #ffd600;
        --pollazo-yellow-2: #fff000;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 50% 62%, var(--pollazo-yellow-2) 0%, var(--pollazo-yellow) 28%, var(--pollazo-orange-2) 62%, var(--pollazo-orange) 100%);
        background-attachment: fixed;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-x pan-y;
        overscroll-behavior: none;
      }

      input,
      textarea,
      select {
        -webkit-user-select: auto !important;
        -khtml-user-select: auto !important;
        -moz-user-select: auto !important;
        -ms-user-select: auto !important;
        user-select: auto !important;
      }

      #root {
        min-height: 100dvh;
        background:
          radial-gradient(circle at 50% 62%, var(--pollazo-yellow-2) 0%, var(--pollazo-yellow) 28%, var(--pollazo-orange-2) 62%, var(--pollazo-orange) 100%);
      }

      #pollazo-boot-screen {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
        background:
          radial-gradient(circle at 50% 62%, var(--pollazo-yellow-2) 0%, var(--pollazo-yellow) 28%, var(--pollazo-orange-2) 62%, var(--pollazo-orange) 100%);
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      #pollazo-boot-screen.pollazo-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #pollazo-boot-screen img {
        width: min(82vw, 430px);
        max-height: 52vh;
        object-fit: contain;
        filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.22));
        animation: pollazoBootPop 850ms cubic-bezier(0.2, 0.9, 0.25, 1.15) both;
      }

      @keyframes pollazoBootPop {
        0% {
          opacity: 0;
          transform: scale(0.86) translateY(12px);
        }
        65% {
          opacity: 1;
          transform: scale(1.035) translateY(0);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div id="pollazo-boot-screen" aria-hidden="true">

        src="https://blogger.googleusercontent.com/img/a/AVvXsEiaSzhzBcTVRTli7NO3yfJjf_xqBKwZWAiQ4mdn_mxI-T9AmbJBi1JJm5NSy0l2bRR70Y4KSkm7FCXnPcAgUTJRLWBriM7BioI8sNUkhrwfh9Dhg8wWRkmv5SrfOkyo1L_Tb3rvjPFaZ2omI6hHF2tc-GXUm-OI9EN7WdAf9YDu_i8GdQJGImUGzzOtKLA"
        alt="Pollazo Galapagueño"
      />
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js?v=26").catch(() => {});
        });
      }

      window.addEventListener("load", () => {
        const splash = document.getElementById("pollazo-boot-screen");

        if (splash) {
          setTimeout(() => {
            splash.classList.add("pollazo-hide");

            setTimeout(() => {
              splash.remove();
            }, 460);
          }, 650);
        }
      });
    </script>
  </body>
